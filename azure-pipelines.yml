# ─────────────────────────────────────────────────────────────────────────────
# NetSqlAzMan Manager — Azure DevOps CI/CD
#
# Build numbering:
#   master push  →  1.0.0.{BuildId}   (artifact only, no GitHub release)
#   tag v1.2.3   →  1.2.3             (publishes to GitHub Releases → auto-update)
#
# Signing:
#   Windows: AzureSignTool via Key Vault (private key never exported)
#   macOS:   self-hosted Mac Mini — cert in Keychain, .env at /Users/mantoadmin/env/.env
#   Linux:   no signing required
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - master
  tags:
    include:
      - 'v*'
  paths:
    exclude:
      - '*.md'

pool:
  vmImage: 'windows-latest'

variables:
  - group: deploy-vault-secrets   # linked to MantoElectron Key Vault

stages:

- stage: Build
  displayName: 'Build & sign Windows installer'
  jobs:
  - job: BuildJob
    displayName: 'Electron Windows build'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── Version + publish flag ────────────────────────────────────────────
    - powershell: |
        $branch = "$(Build.SourceBranch)"
        if ($branch -like "refs/tags/v*") {
          $version = $branch -replace 'refs/tags/v', ''
          Write-Host "##vso[task.setvariable variable=PUBLISH_FLAG]always"
        } else {
          $base = node -e "process.stdout.write(require('./package.json').version)"
          $version = "$base.$(Build.BuildId)"
          Write-Host "##vso[task.setvariable variable=PUBLISH_FLAG]never"
        }
        npm version $version --no-git-tag-version --allow-same-version
        Write-Host "##vso[build.updatebuildnumber]$version"
        Write-Host "Building version: $version"
      displayName: 'Set build version'

    # ── AzureSignTool — signs via Key Vault API, no PFX export needed ─────
    - script: dotnet tool install --global AzureSignTool
      displayName: 'Install AzureSignTool'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign + publish ────────────────────────
    - script: npx electron-builder --publish $(PUBLISH_FLAG)
      displayName: 'Package, sign & publish (electron-builder)'
      env:
        AZURE_KEY_VAULT_URL:    $(AZURE-KEY-VAULT-URL)
        AZURE_CLIENT_ID:        $(AZURE-CLIENT-ID)
        AZURE_CLIENT_SECRET:    $(AZURE-CLIENT-SECRET)
        AZURE_TENANT_ID:        $(AZURE-TENANT-ID)
        AZURE_CERT_NAME:        $(AZURE-CERT-NAME)
        GH_TOKEN:               $(GH-TOKEN)

    # ── Publish installer as pipeline artifact ────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.exe
          **/latest.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer'
        ArtifactName: 'NetSqlAzMan-Installer'
        publishLocation: 'Container'

- stage: BuildMac
  displayName: 'Build & sign macOS dmg'
  jobs:
  - job: BuildMacJob
    displayName: 'Electron macOS build'
    pool:
      name: MacMini
      demands: npm
    steps:

    # ── Copy .env (APPLEID / APPLEIDPASS / TEAMID) from Mac Mini ─────────
    - bash: cp /Users/mantoadmin/env/.env .
      displayName: 'Load Apple credentials from .env'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── Version + publish flag ────────────────────────────────────────────
    - bash: |
        BRANCH="$(Build.SourceBranch)"
        if [[ "$BRANCH" == refs/tags/v* ]]; then
          VERSION="${BRANCH#refs/tags/v}"
          echo "##vso[task.setvariable variable=PUBLISH_FLAG]always"
        else
          BASE=$(node -e "process.stdout.write(require('./package.json').version)")
          VERSION="$BASE.$(Build.BuildId)"
          echo "##vso[task.setvariable variable=PUBLISH_FLAG]never"
        fi
        npm version $VERSION --no-git-tag-version --allow-same-version
        echo "##vso[build.updatebuildnumber]$VERSION"
        echo "Building version: $VERSION"
      displayName: 'Set build version'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign + notarize + publish ────────────
    - script: npx electron-builder --mac --publish $(PUBLISH_FLAG)
      displayName: 'Package, sign, notarize & publish (electron-builder)'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Publish dmg as pipeline artifact ─────────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage macOS installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.dmg
          **/latest-mac.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer-mac'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Mac'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer-mac'
        ArtifactName: 'NetSqlAzMan-Mac'
        publishLocation: 'Container'

- stage: BuildLinux
  displayName: 'Build Linux packages (.deb + .rpm)'
  jobs:
  - job: BuildLinuxJob
    displayName: 'Electron Linux build'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    # ── rpm tools needed to build .rpm packages on Ubuntu ────────────────
    - script: sudo apt-get install -y rpm
      displayName: 'Install rpm build tools'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── Version + publish flag ────────────────────────────────────────────
    - bash: |
        BRANCH="$(Build.SourceBranch)"
        if [[ "$BRANCH" == refs/tags/v* ]]; then
          VERSION="${BRANCH#refs/tags/v}"
          echo "##vso[task.setvariable variable=PUBLISH_FLAG]always"
        else
          BASE=$(node -e "process.stdout.write(require('./package.json').version)")
          VERSION="$BASE.$(Build.BuildId)"
          echo "##vso[task.setvariable variable=PUBLISH_FLAG]never"
        fi
        npm version $VERSION --no-git-tag-version --allow-same-version
        echo "##vso[build.updatebuildnumber]$VERSION"
        echo "Building version: $VERSION"
      displayName: 'Set build version'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: .deb + .rpm + publish ───────────────────────────
    - script: npx electron-builder --linux --publish $(PUBLISH_FLAG)
      displayName: 'Package Linux & publish (deb + rpm)'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Publish packages as pipeline artifact ─────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage Linux packages'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.deb
          **/*.rpm
          **/latest-linux.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer-linux'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Linux'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer-linux'
        ArtifactName: 'NetSqlAzMan-Linux'
        publishLocation: 'Container'

- stage: BuildDocker
  displayName: 'Build & push Docker image'
  jobs:
  - job: DockerJob
    displayName: 'Docker build & push to Docker Hub'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # ── Node.js (needed for Vite build inside Docker) ─────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    # ── Version + push flag ───────────────────────────────────────────────
    - bash: |
        BRANCH="$(Build.SourceBranch)"
        if [[ "$BRANCH" == refs/tags/v* ]]; then
          VERSION="${BRANCH#refs/tags/v}"
          echo "##vso[task.setvariable variable=IMAGE_TAG]$VERSION"
          echo "##vso[task.setvariable variable=SHOULD_PUSH]true"
        else
          BASE=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "##vso[task.setvariable variable=IMAGE_TAG]$BASE.$(Build.BuildId)"
          echo "##vso[task.setvariable variable=SHOULD_PUSH]false"
        fi
      displayName: 'Set image tag'

    # ── Docker login ──────────────────────────────────────────────────────
    - bash: echo "$(DOCKERHUB-TOKEN)" | docker login -u "maticbezjak" --password-stdin
      displayName: 'Login to Docker Hub'
      condition: eq(variables['SHOULD_PUSH'], 'true')
      env:
        DOCKERHUB-TOKEN: $(DOCKERHUB-TOKEN)

    # ── Build & push ──────────────────────────────────────────────────────
    - bash: |
        IMAGE="maticbezjak/netsqlazman-gui"
        VERSION="$(IMAGE_TAG)"
        docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
        docker push "$IMAGE:$VERSION"
        docker push "$IMAGE:latest"
        echo "Pushed $IMAGE:$VERSION and $IMAGE:latest"
      displayName: 'Build & push Docker image'
      condition: eq(variables['SHOULD_PUSH'], 'true')
