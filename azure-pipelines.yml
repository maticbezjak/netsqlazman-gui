# ─────────────────────────────────────────────────────────────────────────────
# NetSqlAzMan Manager — Azure DevOps CI/CD
#
# Certificate: MantoElectronEVCodeSign (PKCS#12, expires 2028-11-08)
#              stored in MantoElectron Key Vault, linked via deploy-vault-secrets.
#
# Key Vault PKCS#12 exports use an empty password — no separate password secret
# is needed. WIN_CSC_KEY_PASSWORD is intentionally set to empty string.
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - '*.md'

pool:
  vmImage: 'windows-latest'

variables:
  - group: deploy-vault-secrets   # linked to MantoElectron Key Vault

stages:

- stage: Build
  displayName: 'Build & sign installer'
  jobs:
  - job: BuildJob
    displayName: 'Electron build'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── Decode cert from Key Vault → temp .pfx ───────────────────────────
    # MantoElectronEVCodeSign is a PKCS#12 secret from the MantoElectron vault.
    # Key Vault PKCS#12 exports have an empty password.
    - powershell: |
        $certPath = Join-Path $env:AGENT_TEMPDIRECTORY "signing.pfx"
        [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('$(MantoElectronEVCodeSign)'))
        Write-Host "##vso[task.setvariable variable=CERT_PATH]$certPath"
      displayName: 'Decode EV signing certificate'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign ─────────────────────────────────
    - script: npx electron-builder --publish never
      displayName: 'Package & sign (electron-builder)'
      env:
        WIN_CSC_LINK: $(CERT_PATH)
        WIN_CSC_KEY_PASSWORD: ''

    # ── Always remove the temp cert ───────────────────────────────────────
    - powershell: |
        if (Test-Path "$(CERT_PATH)") { Remove-Item "$(CERT_PATH)" -Force }
        Write-Host "Certificate cleaned up."
      displayName: 'Remove temp certificate'
      condition: always()

    # ── Publish installer as pipeline artifact ────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.exe
          **/latest.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer'
        ArtifactName: 'NetSqlAzMan-Installer'
        publishLocation: 'Container'
