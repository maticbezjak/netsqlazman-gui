# ─────────────────────────────────────────────────────────────────────────────
# NetSqlAzMan Manager — Azure DevOps CI/CD
#
# Pre-requisites (one-time setup):
#   1. In Key Vault "MantoElectron", add two secrets:
#        ElectronSigningCert      → base64-encoded .pfx contents
#        ElectronSigningPassword  → password for the .pfx
#      PowerShell to encode your .pfx:
#        [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\path\to\cert.pfx")) | clip
#
#   2. In the "deploy-vault-secrets" variable group, click "+ Add" and add:
#        ElectronSigningCert
#        ElectronSigningPassword
#      (They will sync automatically from MantoElectron Key Vault)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - '*.md'

pool:
  vmImage: 'windows-latest'

variables:
  - group: deploy-vault-secrets   # linked to MantoElectron Key Vault

stages:

- stage: Build
  displayName: 'Build & sign installer'
  jobs:
  - job: BuildJob
    displayName: 'Electron build'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── Decode cert from Key Vault secret → temp .pfx ────────────────────
    - powershell: |
        $certPath = Join-Path $env:AGENT_TEMPDIRECTORY "signing.pfx"
        [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('$(ElectronSigningCert)'))
        Write-Host "##vso[task.setvariable variable=CERT_PATH]$certPath"
      displayName: 'Decode signing certificate'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign ─────────────────────────────────
    - script: npx electron-builder --publish never
      displayName: 'Package & sign (electron-builder)'
      env:
        WIN_CSC_LINK: $(CERT_PATH)
        WIN_CSC_KEY_PASSWORD: $(ElectronSigningPassword)

    # ── Always remove the temp cert ───────────────────────────────────────
    - powershell: |
        if (Test-Path "$(CERT_PATH)") { Remove-Item "$(CERT_PATH)" -Force }
        Write-Host "Certificate cleaned up."
      displayName: 'Remove temp certificate'
      condition: always()

    # ── Publish installer as pipeline artifact ────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.exe
          **/latest.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer'
        ArtifactName: 'NetSqlAzMan-Installer'
        publishLocation: 'Container'
