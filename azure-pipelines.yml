# ─────────────────────────────────────────────────────────────────────────────
# NetSqlAzMan Manager — Azure DevOps CI/CD
#
# Build numbering:
#   master push  →  1.0.{BuildId}     (assets uploaded to current Latest release)
#
# Signing:
#   Windows: AzureSignTool via Key Vault (private key never exported)
#   macOS:   self-hosted Mac Mini — cert in Keychain, .env at /Users/mantoadmin/env/.env
#   Linux:   no signing required
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - '*.md'

pool:
  vmImage: 'windows-latest'

variables:
  - group: deploy-vault-secrets   # linked to MantoElectron Key Vault

stages:

- stage: Build
  displayName: 'Build & sign Windows installer'
  jobs:
  - job: BuildJob
    displayName: 'Electron Windows build'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - task: Cache@2
      displayName: 'Cache npm packages'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: npm ci --cache $(Pipeline.Workspace)/.npm
      displayName: 'Install dependencies'

    # ── Version ───────────────────────────────────────────────────────────
    - powershell: |
        $base = node -e "process.stdout.write(require('./package.json').version)"
        $parts = $base.Split('.')
        $version = "$($parts[0]).$($parts[1]).$(Build.BuildId)"
        node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$version';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
        Write-Host "##vso[build.updatebuildnumber]$version"
        Write-Host "Building version: $version"
      displayName: 'Set build version'

    # ── AzureSignTool — signs via Key Vault API, no PFX export needed ─────
    - script: dotnet tool install --global AzureSignTool
      displayName: 'Install AzureSignTool'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign (no publish) ─────────────────────
    - script: npx electron-builder --publish never
      displayName: 'Package & sign (electron-builder)'
      env:
        AZURE_KEY_VAULT_URL:    $(AZURE-KEY-VAULT-URL)
        AZURE_CLIENT_ID:        $(AZURE-CLIENT-ID)
        AZURE_CLIENT_SECRET:    $(AZURE-CLIENT-SECRET)
        AZURE_TENANT_ID:        $(AZURE-TENANT-ID)
        AZURE_CERT_NAME:        $(AZURE-CERT-NAME)

    # ── Upload assets into the current Latest GitHub release ──────────────
    - bash: |
        TAG=$(gh release view --json tagName --jq '.tagName')
        echo "Uploading Windows assets to release: $TAG"
        find release -maxdepth 1 -type f \( -name "*.exe" -o -name "*.blockmap" -o -name "latest.yml" \) -print0 \
          | xargs -0 gh release upload "$TAG" --clobber
      displayName: 'Upload Windows assets to latest GitHub release'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Publish installer as pipeline artifact ────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.exe
          **/latest.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer'
        ArtifactName: 'NetSqlAzMan-Installer'
        publishLocation: 'Container'

- stage: BuildMac
  displayName: 'Build & sign macOS dmg'
  jobs:
  - job: BuildMacJob
    displayName: 'Electron macOS build'
    pool:
      name: MacMini
      demands: npm
    steps:

    # ── Copy .env (APPLEID / APPLEIDPASS / TEAMID) from Mac Mini ─────────
    - bash: cp /Users/mantoadmin/env/.env .
      displayName: 'Load Apple credentials from .env'

    - task: Cache@2
      displayName: 'Cache npm packages'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: npm ci --cache $(Pipeline.Workspace)/.npm
      displayName: 'Install dependencies'

    # ── Version ───────────────────────────────────────────────────────────
    - bash: |
        BASE=$(node -e "process.stdout.write(require('./package.json').version)")
        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        VERSION="$MAJOR.$MINOR.$(Build.BuildId)"
        node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
        echo "##vso[build.updatebuildnumber]$VERSION"
        echo "Building version: $VERSION"
      displayName: 'Set build version'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign + notarize (no publish) ─────────
    - script: npx electron-builder --mac --publish never
      displayName: 'Package, sign & notarize (electron-builder)'

    # ── Upload assets into the current Latest GitHub release ──────────────
    - bash: |
        TAG=$(gh release view --json tagName --jq '.tagName')
        echo "Uploading macOS assets to release: $TAG"
        find release -maxdepth 1 -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest-mac.yml" \) -print0 \
          | xargs -0 gh release upload "$TAG" --clobber
      displayName: 'Upload macOS assets to latest GitHub release'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Publish dmg as pipeline artifact ─────────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage macOS installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.dmg
          **/latest-mac.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer-mac'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Mac'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer-mac'
        ArtifactName: 'NetSqlAzMan-Mac'
        publishLocation: 'Container'

- stage: BuildLinux
  displayName: 'Build Linux packages (.deb + .rpm)'
  jobs:
  - job: BuildLinuxJob
    displayName: 'Electron Linux build'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    # ── rpm tools needed to build .rpm packages on Ubuntu ────────────────
    - script: sudo apt-get install -y rpm
      displayName: 'Install rpm build tools'

    - task: Cache@2
      displayName: 'Cache npm packages'
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: npm | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.npm

    - script: npm ci --cache $(Pipeline.Workspace)/.npm
      displayName: 'Install dependencies'

    # ── Version ───────────────────────────────────────────────────────────
    - bash: |
        BASE=$(node -e "process.stdout.write(require('./package.json').version)")
        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        VERSION="$MAJOR.$MINOR.$(Build.BuildId)"
        node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
        echo "##vso[build.updatebuildnumber]$VERSION"
        echo "Building version: $VERSION"
      displayName: 'Set build version'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: .deb + .rpm (no publish) ────────────────────────
    - script: npx electron-builder --linux --publish never
      displayName: 'Package Linux (deb + rpm)'

    # ── Upload assets into the current Latest GitHub release ──────────────
    - bash: |
        TAG=$(gh release view --json tagName --jq '.tagName')
        echo "Uploading Linux assets to release: $TAG"
        find release -maxdepth 1 -type f \( -name "*.deb" -o -name "*.rpm" -o -name "latest-linux*.yml" \) -print0 \
          | xargs -0 gh release upload "$TAG" --clobber
      displayName: 'Upload Linux assets to latest GitHub release'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Publish packages as pipeline artifact ─────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage Linux packages'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.deb
          **/*.rpm
          **/latest-linux.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer-linux'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Linux'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer-linux'
        ArtifactName: 'NetSqlAzMan-Linux'
        publishLocation: 'Container'

- stage: BuildDocker
  displayName: 'Build & push Docker image'
  jobs:
  - job: DockerJob
    displayName: 'Docker build & push to Docker Hub'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    # ── Resolve semantic version from current Latest release ──────────────
    - bash: |
        TAG=$(gh release view --json tagName --jq '.tagName')
        VERSION="${TAG#v}"
        echo "##vso[task.setvariable variable=IMAGE_TAG]$VERSION"
        echo "Docker image version: $VERSION"
      displayName: 'Set image tag from latest release'
      env:
        GH_TOKEN: $(GH-TOKEN)

    # ── Docker login ──────────────────────────────────────────────────────
    - bash: echo "$(DOCKERHUB-TOKEN)" | docker login -u "brezjakmanto" --password-stdin
      displayName: 'Login to Docker Hub'
      env:
        DOCKERHUB-TOKEN: $(DOCKERHUB-TOKEN)

    # ── Build & push ──────────────────────────────────────────────────────
    - bash: |
        IMAGE="brezjakmanto/netsqlazman-gui"
        VERSION="$(IMAGE_TAG)"
        docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
        docker push "$IMAGE:$VERSION"
        docker push "$IMAGE:latest"
        echo "Pushed $IMAGE:$VERSION and $IMAGE:latest"
      displayName: 'Build & push Docker image'
