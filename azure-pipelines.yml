# ─────────────────────────────────────────────────────────────────────────────
# NetSqlAzMan Manager — Azure DevOps CI/CD
#
# Signing: AzureSignTool calls Key Vault directly — private key never exported.
# Service principal credentials stored in deploy-vault-secrets variable group.
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - master
  paths:
    exclude:
      - '*.md'

pool:
  vmImage: 'windows-latest'

variables:
  - group: deploy-vault-secrets   # linked to MantoElectron Key Vault

stages:

- stage: Build
  displayName: 'Build & sign installer'
  jobs:
  - job: BuildJob
    displayName: 'Electron build'
    steps:

    # ── Node.js ───────────────────────────────────────────────────────────
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - script: npm ci
      displayName: 'Install dependencies'

    # ── AzureSignTool — signs via Key Vault API, no PFX export needed ─────
    - script: dotnet tool install --global AzureSignTool
      displayName: 'Install AzureSignTool'

    # ── Vite renderer build ───────────────────────────────────────────────
    - script: npm run build:renderer
      displayName: 'Build renderer (Vite)'

    # ── electron-builder: package + sign ─────────────────────────────────
    - script: npx electron-builder --publish never
      displayName: 'Package & sign (electron-builder)'
      env:
        AZURE_KEY_VAULT_URL:    $(AZURE_KEY_VAULT_URL)
        AZURE_CLIENT_ID:        $(AZURE_CLIENT_ID)
        AZURE_CLIENT_SECRET:    $(AZURE_CLIENT_SECRET)
        AZURE_TENANT_ID:        $(AZURE_TENANT_ID)
        AZURE_CERT_NAME:        $(AZURE_CERT_NAME)

    # ── Publish installer as pipeline artifact ────────────────────────────
    - task: CopyFiles@2
      displayName: 'Stage installer files'
      inputs:
        SourceFolder: 'release'
        Contents: |
          **/*.exe
          **/latest.yml
        TargetFolder: '$(Build.ArtifactStagingDirectory)/installer'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifact: NetSqlAzMan-Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/installer'
        ArtifactName: 'NetSqlAzMan-Installer'
        publishLocation: 'Container'
