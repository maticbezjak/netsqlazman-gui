appId: com.netsqlazman.gui
productName: NetSqlAzMan Manager
icon: build/icon.png

directories:
  output: release

publish:
  - provider: github
    owner: maticbezjak
    repo: netsqlazman-gui
    releaseType: release

files:
  - dist/**
  - electron/**
  - package.json
  - node_modules/**

extraMetadata:
  main: electron/main.js

win:
  azureSignOptions:
    endpoint: "${AZURE_KEY_VAULT_URL}"
    certificateName: "${AZURE_CERT_NAME}"
    clientId: "${AZURE_CLIENT_ID}"
    clientSecret: "${AZURE_CLIENT_SECRET}"
    tenantId: "${AZURE_TENANT_ID}"
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  target:
    - target: default
      arch:
        - universal

afterSign: scripts/notarize.js

linux:
  target:
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  category: Utility
