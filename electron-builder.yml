appId: com.netsqlazman.gui
productName: NetSqlAzMan Manager

directories:
  output: release

publish:
  - provider: github
    owner: maticbezjak
    repo: netsqlazman-gui

files:
  - dist/**
  - electron/**
  - package.json
  - node_modules/**

extraMetadata:
  main: electron/main.js

win:
  sign: scripts/windowsSign.js
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  target:
    - target: default
      arch:
        - universal

afterSign: scripts/notarize.js

linux:
  target:
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  category: Utility
