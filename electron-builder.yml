appId: com.netsqlazman.gui
productName: NetSqlAzMan Manager

directories:
  output: release

files:
  - dist/**
  - electron/**
  - package.json
  - node_modules/**

extraMetadata:
  main: electron/main.js

win:
  target:
    - target: nsis
      arch:
        - x64
  # Signing — credentials supplied via env vars (WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD)
  # Set signingHashAlgorithms to sha256 only (sha1 is deprecated)
  signingHashAlgorithms:
    - sha256
  # Timestamp server keeps the signature valid after cert expiry
  rfc3161TimeStampServer: 'http://timestamp.digicert.com'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
