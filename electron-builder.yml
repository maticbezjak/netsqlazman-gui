appId: com.netsqlazman.gui
productName: NetSqlAzMan Manager

directories:
  output: release

files:
  - dist/**
  - electron/**
  - package.json
  - node_modules/**

extraMetadata:
  main: electron/main.js

win:
  sign: scripts/windowsSign.js
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
