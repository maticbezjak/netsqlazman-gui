<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shield (white) -->
  <path filter="url(#sh)"
    d="M256 72
       C 240 72  156 94  120 120
       L 120 282
       Q 120 396  256 454
       Q 392 396  392 282
       L 392 120
       C 356 94   272 72  256 72 Z"
    fill="white"/>

  <!-- Lock shackle (indigo arc above body) -->
  <path d="M 228 258 L 228 225 A 28 28 0 0 1 284 225 L 284 258"
    fill="none" stroke="#4338ca" stroke-width="22" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="213" y="250" width="86" height="76" rx="13" fill="#4338ca"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="275" r="12" fill="white"/>
  <!-- Keyhole slot -->
  <rect x="249.5" y="275" width="13" height="21" rx="4" fill="white"/>
</svg>
