services:
  azman:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DB_SERVER:   ${DB_SERVER}
      DB_PORT:     ${DB_PORT:-1433}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
